name: Sync custom feed packages

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v6

      - name: Prepare workspace
        run: |
          rm -rf tmp
          mkdir -p tmp packages

      - name: Clone standalone upstream packages
        run: |
          git clone --depth=1 https://github.com/jerrykuku/luci-theme-argon.git tmp/luci-theme-argon
          git clone --depth=1 https://github.com/jerrykuku/luci-app-argon-config.git tmp/luci-app-argon-config
          git clone --depth=1 https://github.com/tty228/luci-app-wechatpush.git tmp/luci-app-wechatpush

      - name: Sparse clone coolsnowwolf luci packages
        run: |
          git clone --depth=1 --filter=blob:none --sparse -b openwrt-23.05 https://github.com/coolsnowwolf/luci.git tmp/csw-luci
          git -C tmp/csw-luci sparse-checkout set \
            applications/luci-app-netdata \
            applications/luci-app-diskman \
            applications/luci-app-autoreboot \
            applications/luci-app-vsftpd

      - name: Sparse clone coolsnowwolf lede packages
        run: |
          git clone --depth=1 --filter=blob:none --sparse https://github.com/coolsnowwolf/lede.git tmp/csw-lede
          git -C tmp/csw-lede sparse-checkout set \
            package/lean/vsftpd-alt

      - name: Sync package contents as normal directories
        run: |
          rm -rf \
            packages/luci-theme-argon \
            packages/luci-app-argon-config \
            packages/luci-app-wechatpush \
            packages/luci-app-netdata \
            packages/luci-app-diskman \
            packages/luci-app-autoreboot \
            packages/luci-app-vsftpd \
            packages/vsftpd-alt

          mkdir -p \
            packages/luci-theme-argon \
            packages/luci-app-argon-config \
            packages/luci-app-wechatpush \
            packages/luci-app-netdata \
            packages/luci-app-diskman \
            packages/luci-app-autoreboot \
            packages/luci-app-vsftpd \
            packages/vsftpd-alt

          rsync -a --delete --exclude='.git' --exclude='.github' tmp/luci-theme-argon/ packages/luci-theme-argon/
          rsync -a --delete --exclude='.git' --exclude='.github' tmp/luci-app-argon-config/ packages/luci-app-argon-config/
          rsync -a --delete --exclude='.git' --exclude='.github' tmp/luci-app-wechatpush/ packages/luci-app-wechatpush/

          rsync -a --delete --exclude='.git' --exclude='.github' tmp/csw-luci/applications/luci-app-netdata/ packages/luci-app-netdata/
          rsync -a --delete --exclude='.git' --exclude='.github' tmp/csw-luci/applications/luci-app-diskman/ packages/luci-app-diskman/
          rsync -a --delete --exclude='.git' --exclude='.github' tmp/csw-luci/applications/luci-app-autoreboot/ packages/luci-app-autoreboot/
          rsync -a --delete --exclude='.git' --exclude='.github' tmp/csw-luci/applications/luci-app-vsftpd/ packages/luci-app-vsftpd/

          rsync -a --delete --exclude='.git' --exclude='.github' tmp/csw-lede/package/lean/vsftpd-alt/ packages/vsftpd-alt/

      - name: Normalize package Makefiles for custom feed
        run: |
          find packages -type f -name Makefile -print0 | xargs -0 sed -i \
            's#^include ../../luci.mk$#include $(TOPDIR)/feeds/luci/luci.mk#g'

      - name: Normalize APK-incompatible package versions
        run: |
          find packages -type f -name Makefile -print0 | while IFS= read -r -d '' f; do
            sed -i 's/^PKG_VERSION:=v\([0-9]\)/PKG_VERSION:=\1/' "$f"
          done

      - name: Check for remaining APK-incompatible versions
        run: |
          ! grep -R '^PKG_VERSION:=v[0-9]' packages

      - name: Cleanup extra upstream metadata
        run: |
          find packages -type d -name .github -prune -exec rm -rf {} +
          rm -rf tmp
          rm -f .gitmodules

      - name: Sanity check
        run: |
          ! find packages -name .git -type d | grep .
          ! git ls-files --stage | grep 160000
          test -f packages/luci-app-netdata/Makefile
          test -f packages/luci-app-diskman/Makefile
          test -f packages/luci-app-autoreboot/Makefile
          test -f packages/luci-app-vsftpd/Makefile
          test -f packages/vsftpd-alt/Makefile

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet || git commit -m "sync upstream packages"

      - name: Push changes
        run: |
          git push
